<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Meeting Agent</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f9fafb;
  }

  h1 {
    color: #333;
  }

  textarea {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    padding: 10px 20px;
    margin-top: 10px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #45a049;
  }

  #output {
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  h3 {
    margin-bottom: 5px;
    color: #222;
  }

  p {
    margin-top: 0;
  }

  ul {
    margin-top: 5px;
  }
</style>
</head>
<body>

  <h1>AI Meeting Agent</h1>

  <textarea id="inputText" rows="10" cols="50" placeholder="Paste meeting notes here..."></textarea>
  <br><br>

  <button onclick="generateSummary()">Generate Summary</button>

  <h2>Output:</h2>
  <div id="output"></div>

  <script>
    async function generateSummary() {
      const text = document.getElementById("inputText").value;

      const response = await fetch("http://localhost:3000/summarize", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await response.json();
const outputDiv = document.getElementById("output");

outputDiv.innerHTML = `
  <h3>Summary</h3>
  <p>${data.summary}</p>

  <h3>Action Items</h3>
  <ul>
    ${data.action_items.map(item => `<li>${item}</li>`).join("")}
  </ul>

  <h3>Decisions</h3>
  <ul>
    ${data.decisions.map(item => `<li>${item}</li>`).join("")}
  </ul>
`;
      //document.getElementById("output").innerText = JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
